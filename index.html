<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>여의도 밥집 룰렛</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --bg:#f7f5f0; --card:#ffffff; --ink:#1c1c1a; --sub:#6d6a62; --line:#e4e0d6;
  --accent:#0e5c4a; --accent-soft:#e2efe9; --accent-ink:#0a4438;
  --warn:#a05a1f; --warn-soft:#f6ead9; --danger:#b03a2e;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#181816; --card:#232320; --ink:#eceae4; --sub:#9a978e; --line:#3a3934;
    --accent:#4fae92; --accent-soft:#1e332c; --accent-ink:#8fd4bf;
    --warn:#d99a55; --warn-soft:#3a2d1c; --danger:#e07a6f;
  }
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
body{margin:0; background:var(--bg); color:var(--ink);
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  font-size:15px; line-height:1.5; padding:20px 16px 60px; max-width:560px; margin:0 auto;}
h1{font-size:20px; font-weight:700; margin:0; letter-spacing:-0.02em;}
h1 span{color:var(--accent);}
.top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px;}
.top small{color:var(--sub); font-size:12px;}
.lbl{font-size:11px; font-weight:700; color:var(--sub); margin:10px 0 5px; letter-spacing:0.02em;}
.chips{display:flex; flex-wrap:wrap; gap:6px;}
.chip{border:1px solid var(--line); background:var(--card); color:var(--ink);
  border-radius:999px; padding:6px 12px; font-size:13px; cursor:pointer; font-family:inherit;}
.chip.on{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;}
.chip.tag.on{background:var(--warn); border-color:var(--warn);}
.row{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:14px 0;}
.toggle{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--sub); cursor:pointer; user-select:none;}
.toggle input{accent-color:var(--accent); width:16px; height:16px;}
.count{font-size:12px; color:var(--sub);}
.spin-row{display:flex; gap:8px;}
.spin-btn{flex:1; border:none; border-radius:14px; background:var(--accent); color:#fff;
  font-size:17px; font-weight:700; font-family:inherit; padding:15px; cursor:pointer; letter-spacing:-0.01em;}
.spin-btn:active{transform:scale(0.98);}
.n-picks{border:1px solid var(--line); background:var(--card); color:var(--ink);
  border-radius:14px; font-size:15px; font-weight:600; font-family:inherit; padding:0 10px;}
.result{background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:20px 16px; text-align:center; margin:14px 0 8px; min-height:150px;
  display:flex; flex-direction:column; justify-content:center; gap:5px;}
.result .label{font-size:12px; color:var(--sub);}
.result .name{font-size:27px; font-weight:800; letter-spacing:-0.03em;}
.result .meta{font-size:13.5px; color:var(--sub);}
.result .actions{display:flex; gap:8px; justify-content:center; margin-top:12px; flex-wrap:wrap;}
.result .actions button, .result .actions a, .pick-card .pa button, .pick-card .pa a{
  border:1px solid var(--line); background:transparent; color:var(--ink); text-decoration:none;
  border-radius:10px; padding:8px 14px; font-size:13px; font-family:inherit; cursor:pointer;}
.result .actions .primary{background:var(--accent-soft); color:var(--accent-ink); border-color:transparent; font-weight:600;}
.pick-card{border:1px solid var(--line); border-radius:12px; padding:12px; text-align:left;
  display:flex; align-items:center; gap:10px; margin-top:8px;}
.pick-card .num{font-size:15px; font-weight:800; color:var(--accent); width:22px; text-align:center;}
.pick-card .pi{flex:1; min-width:0;}
.pick-card .pn{font-size:16.5px; font-weight:700; letter-spacing:-0.02em;}
.pick-card .pm{font-size:12px; color:var(--sub);}
.pick-card .pa{display:flex; gap:6px;}
.pick-card .pa button, .pick-card .pa a{padding:6px 10px; font-size:12px;}
.sect{font-size:13px; font-weight:700; color:var(--sub); margin:26px 0 8px; display:flex; justify-content:space-between; align-items:center;}
.sect .tools{display:flex; gap:12px;}
.sect .tools button{border:none; background:none; color:var(--sub); font-size:12px; cursor:pointer; font-family:inherit; text-decoration:underline; padding:0;}
.add-btn{width:100%; border:1.5px dashed var(--line); background:transparent; color:var(--sub);
  border-radius:12px; padding:11px; font-size:13.5px; font-weight:600; font-family:inherit; cursor:pointer; margin-bottom:10px;}
.form{background:var(--card); border:1px solid var(--accent); border-radius:14px; padding:14px; margin-bottom:12px; display:none;}
.form.open{display:block;}
.form h3{margin:0 0 10px; font-size:14px; font-weight:700;}
.form .fld{margin-bottom:8px;}
.form label{display:block; font-size:11.5px; color:var(--sub); margin-bottom:3px;}
.form input, .form select{width:100%; border:1px solid var(--line); background:var(--bg); color:var(--ink);
  border-radius:9px; padding:9px 10px; font-size:14px; font-family:inherit;}
.form .cols{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
.form .tagchecks{display:flex; flex-wrap:wrap; gap:10px; padding:4px 0;}
.form .tagchecks label{display:flex; align-items:center; gap:5px; font-size:13px; color:var(--ink); margin:0; cursor:pointer;}
.form .tagchecks input{width:15px; height:15px; accent-color:var(--warn);}
.form .btns{display:flex; gap:8px; margin-top:10px;}
.form .btns button{flex:1; border-radius:10px; padding:10px; font-size:14px; font-family:inherit; cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--ink);}
.form .btns .save{background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700;}
details.grp{background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:7px; overflow:hidden;}
details.grp summary{list-style:none; cursor:pointer; padding:11px 14px; display:flex; justify-content:space-between; align-items:center; user-select:none;}
details.grp summary::-webkit-details-marker{display:none;}
details.grp summary .gt{font-size:14.5px; font-weight:700;}
details.grp summary .gc{font-size:12px; color:var(--sub);}
details.grp[open] summary{border-bottom:1px solid var(--line);}
.item{padding:9px 14px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line);}
.item:last-child{border-bottom:none;}
.item.dim{opacity:0.45;}
.item .info{flex:1; min-width:0;}
.item .nm{font-size:14px; font-weight:600; letter-spacing:-0.01em;}
.item .mt{font-size:11.5px; color:var(--sub); margin-top:1px;}
.item .tg{font-size:10px; font-weight:700; color:var(--warn); background:var(--warn-soft);
  border-radius:5px; padding:1px 5px; margin-left:4px; vertical-align:1px;}
.badge{font-size:11px; font-weight:700; border-radius:6px; padding:3px 7px; cursor:pointer; border:none; font-family:inherit; white-space:nowrap;}
.z5{background:var(--accent-soft); color:var(--accent-ink);}
.z10{background:var(--warn-soft); color:var(--warn);}
.z15{background:var(--line); color:var(--sub);}
.new{font-size:10px; font-weight:800; color:var(--accent); margin-left:4px; vertical-align:2px;}
.visit-btn{border:1px solid var(--line); background:transparent; color:var(--sub);
  border-radius:8px; padding:4px 8px; font-size:11.5px; cursor:pointer; font-family:inherit; white-space:nowrap;}
.visit-btn.done{background:var(--accent-soft); color:var(--accent-ink); border-color:transparent; font-weight:600;}
.icon-btn{border:none; background:none; color:var(--sub); font-size:14px; cursor:pointer; padding:2px 3px; font-family:inherit;}
.icon-btn.del{color:var(--danger);}
details.syncwrap{margin-top:26px;}
details.syncwrap summary{list-style:none; cursor:pointer; font-size:13px; font-weight:700; color:var(--sub); user-select:none;}
details.syncwrap summary::-webkit-details-marker{display:none;}
details.syncwrap summary::after{content:" ›"; }
.sync{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-top:8px;}
.sync-btns{display:flex; gap:8px; margin-bottom:8px;}
.sync-btns button{flex:1; border:1px solid var(--line); background:transparent; color:var(--ink);
  border-radius:10px; padding:9px; font-size:13.5px; font-family:inherit; cursor:pointer; font-weight:600;}
.sync textarea{width:100%; border:1px solid var(--line); background:var(--bg); color:var(--ink);
  border-radius:9px; padding:9px 10px; font-size:12px; font-family:monospace; resize:vertical;}
.sync-msg{font-size:12px; color:var(--accent-ink); margin-top:6px; min-height:16px;}
.hint{font-size:11.5px; color:var(--sub); margin-top:12px; line-height:1.6;}
</style>
</head>
<body>

<div class="top">
  <h1>여의도 <span>밥집 룰렛</span></h1>
  <small>수출입은행 기준</small>
</div>

<div class="lbl">종류</div>
<div class="chips" id="catChips"></div>
<div class="lbl">상황 (겹쳐서 선택 가능)</div>
<div class="chips" id="tagChips"></div>
<div class="lbl">거리 (도보)</div>
<div class="chips" id="distChips"></div>

<div class="row">
  <label class="toggle"><input type="checkbox" id="excl7" checked> 최근 7일 간 곳 제외</label>
  <span class="count" id="poolCount"></span>
</div>

<div class="spin-row">
  <button class="spin-btn" id="spinBtn">🎲 오늘 갈 집 뽑기</button>
  <select class="n-picks" id="nPicks" title="뽑을 개수">
    <option value="1">1곳</option><option value="2">2곳</option><option value="3">3곳</option>
  </select>
</div>

<div class="result" id="result">
  <span class="label">조건 고르고 버튼을 누르세요</span>
</div>

<div class="sect">
  <span id="listTitle">목록</span>
  <span class="tools">
    <button id="expandBtn">모두 펼치기</button>
    <button id="resetBtn">방문기록 초기화</button>
  </span>
</div>

<button class="add-btn" id="addBtn">＋ 밥집 추가</button>

<div class="form" id="form">
  <h3 id="formTitle">밥집 추가</h3>
  <div class="fld"><label>상호 *</label><input id="fName" placeholder="예: 진주집"></div>
  <div class="cols">
    <div class="fld"><label>종류</label><select id="fCat"></select></div>
    <div class="fld"><label>거리 (도보)</label>
      <select id="fZone"><option value="5">5분 내</option><option value="10">10분 내</option><option value="15">15분 내</option></select>
    </div>
  </div>
  <div class="cols">
    <div class="fld"><label>대표 메뉴</label><input id="fMenu" placeholder="예: 콩국수"></div>
    <div class="fld"><label>장소/건물</label><input id="fLoc" placeholder="예: 정우빌딩"></div>
  </div>
  <div class="fld"><label>상황 태그</label><div class="tagchecks" id="fTags"></div></div>
  <div class="btns">
    <button id="cancelBtn">취소</button>
    <button class="save" id="saveBtn">저장</button>
  </div>
</div>

<div id="list"></div>

<details class="syncwrap">
  <summary>기기 간 데이터 옮기기 (방문기록·수정내역)</summary>
  <div class="sync">
    <div class="sync-btns">
      <button id="exportBtn">📤 내보내기 (복사)</button>
      <button id="importBtn">📥 가져오기</button>
    </div>
    <textarea id="syncBox" placeholder="가져오기: 다른 기기에서 내보낸 코드를 여기에 붙여넣고 '가져오기'를 누르세요" rows="3"></textarea>
    <div class="sync-msg" id="syncMsg"></div>
  </div>
</details>

<p class="hint">
· 방문 기록과 밥집 수정 내역은 기기(브라우저)마다 따로 저장됩니다.<br>
· 거리 배지를 누르면 5→10→15분으로 바뀝니다. ✎ 수정 / ✕ 삭제.<br>
· <b>NEW</b>는 여의도역 방면 확장으로 추가한 인기 밥집입니다.
</p>

const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  const list = BASE.filter(d => !deleted.includes(d.n))
    .map(d => edits[d.n] ? {...d, ...edits[d.n]} : d);
  return list.concat(added).map(d => ({...d, t: d.t || []}));
}
const daysAgo = n => { const v = visits[n]; if(!v) return null;
  return Math.floor((Date.now() - v) / 86400000); };
const recent = n => { const d = daysAgo(n); return d !== null && d < 7; };

function matches(d){
  return (cat === "전체" || d.c === cat) &&
    (dist === 0 || d.z <= dist) &&
    selTags.every(t => d.t.includes(t));
}
function pool(){
  return all().filter(d => matches(d) && (!$("excl7").checked || !recent(d.n)));
}

function renderChips(){
  const cats = ["전체", ...CATS.filter(c => all().some(d => d.c === c))];
  $("catChips").innerHTML = cats.map(c =>
    `<button class="chip ${c===cat?'on':''}" onclick="setCat('${c}')">${c}</button>`).join("");
  $("tagChips").innerHTML = TAGS.map(t =>
    `<button class="chip tag ${selTags.includes(t)?'on':''}" onclick="toggleTag('${t}')">${t}</button>`).join("");
  $("distChips").innerHTML = DISTS.map(d =>
    `<button class="chip ${d.v===dist?'on':''}" onclick="setDist(${d.v})">${d.t}</button>`).join("");
}
window.setCat = c => { cat = c; refresh(); };
window.setDist = v => { dist = v; refresh(); };
window.toggleTag = t => {
  selTags = selTags.includes(t) ? selTags.filter(x => x !== t) : [...selTags, t];
  refresh();
};

function esc(s){ return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }
function mapLink(name){
  return `https://map.naver.com/p/search/${encodeURIComponent("여의도 " + name)}`;
}

function itemHTML(d){
  const excl = $("excl7").checked;
  const ago = daysAgo(d.n), r = recent(d.n);
  const visitTxt = ago === null ? "다녀옴" : (ago === 0 ? "오늘 ✓" : ago + "일 전 ✓");
  return `<div class="item ${excl && r ? 'dim' : ''}">
    <div class="info">
      <div class="nm">${d.n}${d.nw ? '<span class="new">NEW</span>' : ''}${d.t.map(t => `<span class="tg">${t}</span>`).join("")}</div>
      <div class="mt">${[d.m, d.l].filter(Boolean).join(" · ") || "&nbsp;"}</div>
    </div>
    <button class="badge z${d.z}" onclick="cycleZone('${esc(d.n)}')" title="거리 변경">${d.z}분</button>
    <button class="visit-btn ${r ? 'done' : ''}" onclick="toggleVisit('${esc(d.n)}')">${visitTxt}</button>
    <button class="icon-btn" onclick="startEdit('${esc(d.n)}')" title="수정">✎</button>
    <button class="icon-btn del" onclick="delPlace('${esc(d.n)}')" title="삭제">✕</button>
  </div>`;
}

function renderList(){
  const data = all().filter(matches);
  $("listTitle").textContent = `목록 (${data.length}곳)`;
  const groups = CATS.filter(c => data.some(d => d.c === c));
  const filtered = cat !== "전체" || selTags.length > 0;
  $("list").innerHTML = groups.map(g => {
    const items = data.filter(d => d.c === g).sort((a,b) => a.z - b.z || a.n.localeCompare(b.n));
    const open = openGrps[g] || filtered;
    return `<details class="grp" ${open ? 'open' : ''} data-g="${g}">
      <summary><span class="gt">${g}</span><span class="gc">${items.length}곳 ›</span></summary>
      ${items.map(itemHTML).join("")}
    </details>`;
  }).join("");
  document.querySelectorAll("details.grp").forEach(el => {
    el.addEventListener("toggle", () => { openGrps[el.dataset.g] = el.open; });
  });
}

function refresh(){
  renderChips();
  $("poolCount").textContent = `후보 ${pool().length}곳 / 전체 ${all().length}곳`;
  renderList();
}

window.cycleZone = n => {
  const d = all().find(x => x.n === n);
  const next = {5:10, 10:15, 15:5}[d.z];
  const ai = added.findIndex(x => x.n === n);
  if(ai >= 0){ added[ai].z = next; save(LS.a, added); }
  else { edits[n] = {...(edits[n]||{}), z: next}; save(LS.e, edits); }
  refresh();
};

window.toggleVisit = n => {
  if(recent(n)){ delete visits[n]; } else { visits[n] = Date.now(); }
  save(LS.v, visits); refresh();
};

window.delPlace = n => {
  if(!confirm(`'${n}' 을(를) 목록에서 삭제할까요?`)) return;
  const ai = added.findIndex(x => x.n === n);
  if(ai >= 0){ added.splice(ai, 1); save(LS.a, added); }
  else { deleted.push(n); save(LS.d, deleted); }
  delete edits[n]; save(LS.e, edits);
  refresh();
};

function openForm(title){
  $("formTitle").textContent = title;
  $("fCat").innerHTML = CATS.map(c => `<option>${c}</option>`).join("");
  $("fTags").innerHTML = TAGS.map(t =>
    `<label><input type="checkbox" value="${t}"> ${t}</label>`).join("");
  $("form").classList.add("open");
  $("addBtn").style.display = "none";
}
function closeForm(){
  $("form").classList.remove("open");
  $("addBtn").style.display = "";
  editing = null;
  ["fName","fMenu","fLoc"].forEach(id => $(id).value = "");
}

$("addBtn").onclick = () => { editing = null; openForm("밥집 추가");
  $("fZone").value = "5"; $("fName").focus(); };

window.startEdit = n => {
  const d = all().find(x => x.n === n);
  editing = n;
  openForm("밥집 수정");
  $("fName").value = d.n; $("fCat").value = d.c;
  $("fZone").value = d.z; $("fMenu").value = d.m || ""; $("fLoc").value = d.l || "";
  document.querySelectorAll("#fTags input").forEach(cb => cb.checked = d.t.includes(cb.value));
  $("form").scrollIntoView({behavior:"smooth", block:"center"});
};

$("cancelBtn").onclick = closeForm;
$("saveBtn").onclick = () => {
  const n = $("fName").value.trim();
  if(!n){ alert("상호를 입력하세요"); return; }
  const tags = [...document.querySelectorAll("#fTags input:checked")].map(cb => cb.value);
  const rec = {n, c: $("fCat").value, z: +$("fZone").value,
    m: $("fMenu").value.trim(), l: $("fLoc").value.trim(), t: tags};
  if(editing){
    if(n !== editing && all().some(x => x.n === n)){ alert("같은 이름이 이미 있어요"); return; }
    const ai = added.findIndex(x => x.n === editing);
    if(ai >= 0){ added[ai] = rec; save(LS.a, added); }
    else if(n === editing){ edits[editing] = {c:rec.c, z:rec.z, m:rec.m, l:rec.l, t:rec.t}; save(LS.e, edits); }
    else { deleted.push(editing); save(LS.d, deleted);
      delete edits[editing]; save(LS.e, edits);
      added.push(rec); save(LS.a, added); }
    if(visits[editing] && n !== editing){ visits[n] = visits[editing]; delete visits[editing]; save(LS.v, visits); }
  } else {
    if(all().some(x => x.n === n)){ alert("같은 이름이 이미 있어요"); return; }
    added.push(rec); save(LS.a, added);
  }
  closeForm(); refresh();
};

$("resetBtn").onclick = () => {
  if(confirm("방문 기록을 모두 지울까요?\n(추가·수정한 밥집은 유지됩니다)")){
    visits = {}; localStorage.removeItem(LS.v); refresh();
  }
};

let allOpen = false;
$("expandBtn").onclick = () => {
  allOpen = !allOpen;
  CATS.forEach(c => openGrps[c] = allOpen);
  $("expandBtn").textContent = allOpen ? "모두 접기" : "모두 펼치기";
  renderList();
};

function pickN(arr, k){
  const copy = [...arr], out = [];
  while(out.length < k && copy.length){
    out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
  }
  return out;
}

let spinning = false;
$("spinBtn").onclick = () => {
  if(spinning) return;
  const p = pool();
  const res = $("result");
  if(!p.length){
    res.innerHTML = '<span class="label">조건에 맞는 후보가 없어요 — 필터를 넓혀보세요</span>';
    return;
  }
  const k = Math.min(+$("nPicks").value, p.length);
  spinning = true;
  let i = 0;
  const ticks = 16 + Math.floor(Math.random() * 8);
  (function tick(){
    const d = p[Math.floor(Math.random() * p.length)];
    res.innerHTML = `<span class="label">뽑는 중…</span><span class="name">${d.n}</span>`;
    i++;
    if(i < ticks){ setTimeout(tick, 45 + Math.pow(i / ticks, 2) * 200); }
    else {
      const picks = pickN(p, k);
      if(picks.length === 1){
        const pk = picks[0];
        res.innerHTML = `
          <span class="label">오늘의 밥집 · 도보 ${pk.z}분</span>
          <span class="name">${pk.n}</span>
          <span class="meta">${[pk.c, pk.m, pk.l].filter(Boolean).join(" · ")}</span>
          <div class="actions">
            <button class="primary" onclick="toggleVisit('${esc(pk.n)}')">오늘 다녀옴 체크</button>
            <a href="${mapLink(pk.n)}" target="_blank">지도 보기</a>
            <button onclick="document.getElementById('spinBtn').click()">다시 뽑기</button>
          </div>`;
      } else {
        res.innerHTML = `<span class="label">오늘의 후보 ${picks.length}곳 — 골라 가세요</span>` +
          picks.map((pk, idx) => `
            <div class="pick-card">
              <div class="num">${idx + 1}</div>
              <div class="pi">
                <div class="pn">${pk.n}</div>
                <div class="pm">${[pk.c, pk.m, '도보 ' + pk.z + '분'].filter(Boolean).join(" · ")}</div>
              </div>
              <div class="pa">
                <button onclick="toggleVisit('${esc(pk.n)}')">다녀옴</button>
                <a href="${mapLink(pk.n)}" target="_blank">지도</a>
              </div>
            </div>`).join("") +
          `<div class="actions"><button onclick="document.getElementById('spinBtn').click()">다시 뽑기</button></div>`;
      }
      spinning = false;
    }
  })();
};

$("exportBtn").onclick = async () => {
  const payload = JSON.stringify({yr:1, t:Date.now(), v:visits, e:edits, d:deleted, a:added});
  $("syncBox").value = payload;
  $("syncBox").select();
  let copied = false;
  try{ await navigator.clipboard.writeText(payload); copied = true; }catch(err){
    try{ copied = document.execCommand("copy"); }catch(e2){}
  }
  $("syncMsg").textContent = copied
    ? "복사됐어요 — 메신저 등으로 다른 기기에 보내서 붙여넣으세요"
    : "자동 복사가 안 되는 환경이에요 — 아래 코드를 길게 눌러 직접 복사하세요";
};

$("importBtn").onclick = () => {
  const raw = $("syncBox").value.trim();
  if(!raw){ $("syncMsg").textContent = "먼저 내보낸 코드를 위 칸에 붙여넣으세요"; return; }
  let data;
  try{ data = JSON.parse(raw); }catch(err){
    $("syncMsg").textContent = "코드 형식이 잘못됐어요 — 전체를 빠짐없이 붙여넣었는지 확인하세요"; return;
  }
  if(!data || data.yr !== 1){
    $("syncMsg").textContent = "이 앱에서 내보낸 코드가 아니에요"; return;
  }
  if(!confirm("가져오면 이 기기의 방문 기록과 밥집 수정 내역을 덮어씁니다. 진행할까요?")) return;
  visits = data.v || {}; edits = data.e || {}; deleted = data.d || []; added = data.a || [];
  save(LS.v, visits); save(LS.e, edits); save(LS.d, deleted); save(LS.a, added);
  $("syncBox").value = "";
  const when = data.t ? new Date(data.t).toLocaleString("ko-KR") : "";
  $("syncMsg").textContent = "가져오기 완료" + (when ? ` (${when} 내보낸 데이터)` : "");
  refresh();
};

$("excl7").onchange = refresh;
refresh();
</script>
</body>
</html>
